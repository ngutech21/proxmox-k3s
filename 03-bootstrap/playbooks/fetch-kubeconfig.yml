---
- name: Fetch k3s kubeconfig from first control-plane node
  hosts: server[0]
  become: true
  gather_facts: false

  tasks:
    - name: Fetch kubeconfig from k3s server
      ansible.builtin.fetch:
        src: /etc/rancher/k3s/k3s.yaml
        dest: "{{ local_kubeconfig_raw }}"
        flat: true
